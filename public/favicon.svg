<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <circle cx="50" cy="50" r="50" fill="#0d1b2a"/>

  <!-- Outer globe ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#00ff99" stroke-width="2.5"/>

  <!-- Inner globe ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00ff99" stroke-width="2"/>

  <!-- Drone arms (diagonal lines from center to propeller circles) -->
  <line x1="50" y1="50" x2="29" y2="29" stroke="#00ccff" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="71" y2="29" stroke="#00ccff" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="29" y2="71" stroke="#00ccff" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="71" y2="71" stroke="#00ccff" stroke-width="1.5"/>

  <!-- 4 propeller circles at diagonal corners -->
  <circle cx="29" cy="29" r="11" fill="none" stroke="#00ccff" stroke-width="1.8"/>
  <circle cx="71" cy="29" r="11" fill="none" stroke="#00ccff" stroke-width="1.8"/>
  <circle cx="29" cy="71" r="11" fill="none" stroke="#00ccff" stroke-width="1.8"/>
  <circle cx="71" cy="71" r="11" fill="none" stroke="#00ccff" stroke-width="1.8"/>

  <!-- Drone body center square -->
  <rect x="43" y="43" width="14" height="14" rx="2" fill="none" stroke="#00ccff" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3.5" fill="#ff6633"/>
  <circle cx="50" cy="50" r="1.8" fill="#ffffff"/>
</svg>
